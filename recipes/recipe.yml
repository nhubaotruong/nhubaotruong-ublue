        - atim/starship
        - ublue-os/packages
        - ublue-os/staging
        - ycollet/audinux
        - ublue-os/bazzite
        - ublue-os/bazzite-multilib
        - ganto/lxc4
        - bieszczaders/kernel-cachyos-addons
        - trixieua/mutter-patched
        - clarlok/tools
    install:
