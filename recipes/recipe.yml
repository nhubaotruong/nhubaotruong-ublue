        - starship
        - gnome-tweaks
        - neovim
        - zstd
        - ibus-bamboo
        # - ibus-unikey
        - tailscale
        - breeze-cursor-theme
        - i2c-tools
        - ddcutil
        - edk2-ovmf
        - zsh
        # - igt-gpu-tools
        - libgda
        - libgda-sqlite
        - firewall-config
        - dejavu-sans-fonts
        - dejavu-serif-fonts
        - liberation-fonts
        # - ufraw
        - bees
        - rmlint
        - python3-icoextract
        - gnome-directory-thumbnailer
        - gnome-epub-thumbnailer
        - gnome-kra-ora-thumbnailer
        - waydroid
        - lxc
        - lxc-libs
        - cage
        - wlr-randr
        - nautilus-open-any-terminal
        - fuse-sshfs
        - openssh-askpass
        - ifuse
        - libimobiledevice
        - usbmuxd
        - wl-clipboard
        - xclip
        - bindfs
        - powertop
        - foo2zjs
        - bootc
        # - rsms-inter-vf-fonts
        - kernel-tools
        # - scx-scheds
        - fontawesome-fonts-all
        - samba-dcerpc
        - samba-ldb-ldap-modules
        - samba-winbind-clients
        - samba-winbind-modules
        - samba
        - yq
        - printer-driver-brlaser
        # - openresolv
        - python-pysocks
        # - openrazer-daemon
        # - python3-openrazer
        - fuse-btfs
        - gvfs
        - gvfs-afc
        - gvfs-afp
        - gvfs-archive
        - gvfs-client
        - gvfs-fuse
        - gvfs-goa
        - gvfs-gphoto2
        - gvfs-mtp
        - gvfs-nfs
        - gvfs-smb
        - ublue-os-media-automount-udev
        - pcre
        - cloudflare-warp
        - adw-gtk3-theme
        - python3-pillow
        - python3-pyelftools
        - python3-xapps-overrides
        - xapps
        - squashfs-tools-ng
        - docker-ce
        - docker-ce-cli
        - containerd.io
        - docker-buildx-plugin
        - docker-compose-plugin
        - docker-ce-rootless-extras
        - ghostty
        # - virt-manager
        # - qemu
        # - qemu-system-x86
        - qemu-user-binfmt
        - qemu-user-static
        # - libvirt
        # - libvirt-nss
        # - virtiofsd
        # - guestfs-tools
        # - swtpm
        - davfs2
        - freerdp
        - evolution-ews-core
        - gnupg2-scdaemon
        - fuse-encfs
        - iwd
        - uld
        - libcec
        - v4l-utils
        - gcc
        - gcc-c++
        - tlp
        - tlp-pd
        - tlp-rdw
        - util-linux
        - libappindicator-gtk3
