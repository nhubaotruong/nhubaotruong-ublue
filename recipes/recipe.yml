# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
# image will be published to ghcr.io/<user>/<name>
name: nhubaotruong-ublue
# description will be included in the image's metadata
description: nhubaotruong uBlue image

# the base image to build on top of (FROM) and the version tag to use
base-image: ghcr.io/ublue-os/silverblue-main
image-version: 44 # latest is also supported if you want new updates ASAP

# module configuration, executed in order
# you can include multiple instances of the same module
modules:
  - type: files
    files:
      - source: files
        destination: /

  - type: containerfile
    snippets:
      - |
        RUN curl -sSL https://packages.microsoft.com/config/rhel/10/insiders-slow.repo -o /etc/yum.repos.d/microsoft-insiders-slow.repo && \
        dnf5 install -y --setopt=tsflags=noscripts mdatp
  - type: script
    scripts:
      - webkit2gtk3-dummy.sh
  - type: dnf
    repos:
      nonfree: rpmfusion
      files:
        # - https://raw.githubusercontent.com/coreos/fedora-coreos-config/testing-devel/fedora-coreos-pool.repo
        - https://download.opensuse.org/repositories/home:lamlng/Fedora_%OS_VERSION%/home:lamlng.repo
        # - https://openrazer.github.io/hardware:razer.repo
        - https://download.docker.com/linux/fedora/docker-ce.repo
        - https://pkgs.tailscale.com/stable/fedora/tailscale.repo
        - https://pkg.cloudflareclient.com/cloudflare-warp-ascii.repo
        - https://negativo17.org/repos/fedora-uld.repo
        - charm.repo
        - terra.repo
        - terra-mesa.repo
        - terra-extras.repo
