    replace:
      # - from-repo: copr:copr.fedorainfracloud.org:trixieua:mutter-patched
      #   allow-erasing: true
      #   packages:
      #     - mutter
      #     - mutter-common
      #     - gnome-shell
      #     - gnome-shell-common
      # - from-repo: terra-extras
      #   # skip-unavailable: true
      #   allow-erasing: true
      #   packages:
      #     - switcheroo-control
      - from-repo: copr:copr.fedorainfracloud.org:ublue-os:bazzite-multilib
        # skip-unavailable: true
        allow-erasing: true
        packages:
          # - pipewire
          # - bluez
          # - xorg-x11-server-Xwayland
          - NetworkManager
          # - gsettings-desktop-schemas
          # - mutter
          # - gnome-shell

  - type: containerfile
    snippets:
      - |
        RUN --mount=type=bind,from=ghcr.io/ublue-os/akmods:coreos-stable-44,source=/kernel-rpms,target=/tmp/kernel-rpms \
        rpm --erase kernel --nodeps && \
        rpm --erase kernel-core --nodeps && \
        rpm --erase kernel-modules --nodeps && \
        rpm --erase kernel-modules-core --nodeps && \
        rpm --erase kernel-modules-extra --nodeps && \
        dnf5 -y install \
        /tmp/kernel-rpms/kernel-[0-9]*.rpm \
        /tmp/kernel-rpms/kernel-core-*.rpm \
        /tmp/kernel-rpms/kernel-modules-*.rpm \
        /tmp/kernel-rpms/kernel-devel-*.rpm && \
        dnf5 versionlock add kernel kernel-devel kernel-devel-matched kernel-core kernel-modules kernel-modules-core kernel-modules-extra

  - type: copy
    from: ghcr.io/ublue-os/akmods:coreos-stable-44
    src: /rpms/kmods
    dest: /tmp/rpms

  - type: copy
    from: ghcr.io/ublue-os/akmods-zfs:coreos-stable-44
    src: /rpms/kmods
    dest: /tmp/rpms

  - type: containerfile
    snippets:
      - RUN sed -i 's@enabled=0@enabled=1@g' /etc/yum.repos.d/_copr_ublue-os-akmods.repo
      - RUN dnf5 -y install /tmp/rpms/kmod-v4l2loopback-*.rpm /tmp/rpms/kmod-xpadneo-*.rpm /tmp/rpms/kmod-xone-*.rpm /tmp/rpms/zfs/kmod-zfs-*.rpm /tmp/rpms/zfs/libnvpair[0-9]-*.rpm /tmp/rpms/zfs/libuutil[0-9]-*.rpm /tmp/rpms/zfs/libzfs[0-9]-*.rpm /tmp/rpms/zfs/libzpool[0-9]-*.rpm /tmp/rpms/zfs/python3-pyzfs-*.rpm /tmp/rpms/zfs/other/zfs-dracut-*.rpm /tmp/rpms/zfs/zfs-*.rpm pv
      - RUN sed -i 's@enabled=1@enabled=0@g' /etc/yum.repos.d/_copr_ublue-os-akmods.repo

  - from-file: flatpak.yml

  # - type: yafti # if included, yafti and it's dependencies (pip & libadwaita) will be installed and set up
  #   custom-flatpaks:
  # this section is optional
  # - Celluloid: io.github.celluloid_player.Celluloid
  # - Krita: org.kde.krita

  - type: bling # configure what to pull in from ublue-os/bling
    install:
      - dconf-update-service

  - type: gnome-extensions
    install:
      - "4269" # https://extensions.gnome.org/extension/4269/alphabetical-app-grid/
      - "4724" # https://extensions.gnome.org/extension/4724/window-calls/
      - "8834" # https://extensions.gnome.org/extension/8834/copyous/
      - "4691" # https://extensions.gnome.org/extension/4691/pip-on-top/
      - "5982" # https://extensions.gnome.org/extension/5982/cloudflare-warp-toggle/
      - "6670" # https://extensions.gnome.org/extension/6670/bluetooth-battery-meter/

  - type: brew
    brew-analytics: false
    nofile-limits: true
    # direct-pull: true

  # - type: soar
  #   additional-repos: true
  #   auto-upgrade: true
  #   upgrade-interval: "3h"

  - type: script
    snippets:
      - sed -i~ -E 's/=.\$\(command -v (nft|ip6?tables-legacy).*/=/g' /usr/lib/waydroid/data/scripts/waydroid-net.sh
      - sed -i 's/^LXC_USE_NFT="true"/LXC_USE_NFT="false"/' /usr/lib/waydroid/data/scripts/waydroid-net.sh
      - sed -i 's|^lxc\.hook\.post-stop = /dev/null|#lxc.hook.post-stop = /dev/null|' /usr/lib/waydroid/data/configs/config_base
      - ln -sf /usr/lib/python3/dist-packages/XappThumbnailers $(python3 -c "import site; print(site.getsitepackages()[-1])")/XappThumbnailers
      # - sed -i -e '38,45 s/^[[:space:]]*/&# /' -e '67,74 s/^[[:space:]]*/&# /' "/usr/lib/waydroid/tools/helpers/images.py"

  - type: script
    scripts:
      # - cursor.sh
      # - dnsproxy.sh
      - nerd-fonts.sh
      # - mdatp.sh
      # - byedpi.sh
      - joypixels.sh
      - microsoft-fonts.sh
      - papirus-icon-theme.sh
      # - teamviewer.sh
      # - nanorc.sh
      # - nix-installer.sh
      # - bazzite.sh
      # - ibus-lotus.sh
      - gnome-extensions.sh
      - depmod.sh

  - type: gschema-overrides
    include:
      - zz1-desktop.gschema.override

  - type: systemd
    system:
      enabled:
        - tlp.service
        - tlp-pd.service
        - tailscaled.service
        - fstrim.timer
        # - libvirtd.socket
        # - swtpm-workaround.service
        # - waydroid-workaround.service
        # - libvirt-workaround.service
        # - warp-svc.service
        # - scx_loader.service
        - setup-swap.service
        - setup-swap-ext4.service
        - mdatp.service
        # - powertop.service # disabled: conflicts with TLP (both write to same sysfs power nodes)
        # - dev-hugepages1G.mount # no hugepagesz=1G karg, condition never met
        - cec-onboot.service
        - cec-onpoweroff.service
        - cec-onsleep.service
        - chronyd.service
      disabled:
        - docker.socket
        - raid-check.timer
        - systemd-homed.service
        - systemd-homed-activate.service
        - waydroid-container.service
        - iwd.service
      masked:
        - wpa_supplicant.service
    user:
      enabled:
        - docker-rootless-setup.service
        - fontconfig-cache.service
        # - podman.socket
        # - appman-update.timer
        # - openrazer-daemon.service

  - type: initramfs

  - type: kargs
    kargs:
      - rd.luks.options=discard,tpm2-device=auto,no-read-workqueue,no-write-workqueue
      - nowatchdog
      - quiet
      # cgroup_no_v1=all - default on Fedora 43
      # systemd.unified_cgroup_hierarchy=1 - default on Fedora 43
      - cryptomgr.notests
      #- initcall_debug
      - intel_iommu=igfx_off
      # kvm-intel.nested=1 - moved to modprobe.d/override.conf
      - no_timer_check
      #- noreplace-smp
      - page_alloc.shuffle=1
      #- rcupdate.rcu_expedited=1
      - rootfstype=ext4,btrfs,xfs,f2fs
      - clocksource=tsc
      - tsc=reliable
      - init_on_alloc=1
      #- init_on_free=1
      # random.trust_cpu=on - default since kernel 5.4+
      - randomize_kstack_offset=1
      - preempt=full
      # kvm.ignore_msrs=1 - moved to modprobe.d/override.conf
      # kvm.report_ignored_msrs=0 - moved to modprobe.d/override.conf
      # - ostree.prepare-root.composefs=0
      - rd.shell=0
      - rd.emergency=halt
      - zswap.enabled=1
      - zswap.shrinker_enabled=1
      - zswap.max_pool_percent=15
      - zswap.zpool=zsmalloc
      - zswap.compressor=lz4
      - rcutree.enable_rcu_lazy=1
      #- nr_running=1
      - pcie_aspm=force
      - workqueue.power_efficient=1
      # snd_hda_intel.power_save=1 - moved to modprobe.d/override.conf
      # snd_hda_intel.power_save_controller=Y - moved to modprobe.d/override.conf
      # split_lock_detect=off - handled by kernel.split_lock_mitigate=0 in sysctl
      - nosoftlockup
      - transparent_hugepage=madvise
      - rcu_nocbs=all

  - type: signing
