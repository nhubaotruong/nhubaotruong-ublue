# Performance and energy optimization

# Disable NMI watchdog (belt-and-suspenders with nowatchdog karg)
kernel.nmi_watchdog=0

# Delay dirty page writeback to 15s (fewer disk wakeups on battery)
vm.dirty_writeback_centisecs=1500

# Delay writeback further when on battery (triggered after disk goes idle)
vm.laptop_mode=5

# Disable proactive memory compaction (saves background CPU)
vm.compaction_proactiveness=0

# Consolidate timer interrupts to fewer CPUs (allows deeper idle on others)
kernel.timer_migration=1
