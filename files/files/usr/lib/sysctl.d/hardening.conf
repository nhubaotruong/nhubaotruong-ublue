# Disable ICMP Redirect Acceptance
net.ipv4.conf.all.accept_redirects=0
net.ipv4.conf.all.send_redirects=0
net.ipv4.conf.default.accept_redirects=0
net.ipv4.conf.all.secure_redirects=0
net.ipv4.conf.default.secure_redirects=0
net.ipv6.conf.all.accept_redirects=0
net.ipv6.conf.default.accept_redirects=0

# Enable Log Spoofed Packets, Source Routed Packets, Redirect Packets
net.ipv4.conf.all.log_martians=1
net.ipv4.conf.default.log_martians=1

# Enable ipv6 privacy extension
net.ipv6.conf.all.use_tempaddr=2
net.ipv6.conf.default.use_tempaddr=2

kernel.sysrq=0

## Prevent kernel info leaks in console during boot.
## https://phabricator.whonix.org/T950
kernel.printk=3 3 3 3

## Disables kexec which can be used to replace the running kernel.
kernel.kexec_load_disabled=1

# Improve ALSR effectiveness for mmap.
vm.mmap_rnd_bits = 32
vm.mmap_rnd_compat_bits = 16

# Enable SYN flood protection to prevent DDoS attacks
net.ipv4.tcp_syncookies = 1

# Ignore source-routed packets to prevent routing manipulation
net.ipv4.conf.all.accept_source_route = 0
net.ipv4.conf.default.accept_source_route = 0

# Ignore ICMP broadcasts to avoid participating in Smurf DDoS amplification attacks
net.ipv4.icmp_echo_ignore_broadcasts = 1

# Ignore bad/malformed ICMP error responses to prevent log flooding
net.ipv4.icmp_ignore_bogus_error_responses = 1

# Implement RFC 1337 fix to protect against TCP TIME-WAIT assassination
net.ipv4.tcp_rfc1337 = 1

# Enable full Address Space Layout Randomization (ASLR) to mitigate memory exploits
kernel.randomize_va_space = 2

# Provide protection from ToCToU (Time-of-Check to Time-of-Use) link races
fs.protected_hardlinks = 1
fs.protected_symlinks = 1
