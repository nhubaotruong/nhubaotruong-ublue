# NMI_WATCHDOG=0 - already set via nowatchdog karg and sysctl

# Default to balanced profile, auto-switch on power source change
# 1 = auto switch (ACâ†’performance, BATâ†’balanced)
TLP_AUTO_SWITCH=2
TLP_DEFAULT_MODE=BAL

